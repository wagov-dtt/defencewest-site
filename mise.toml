[tools]
python = "3.12"
uv = "0.11.3"
hugo = "0.159.2"
lychee = "0.23.0"
"github:kristoff-it/superhtml" = "0.6.2"
"github:boyter/scc" = "3.7.0"

[env]
PYTHONDONTWRITEBYTECODE = "1"

[tasks.setup]
description = "Install Python dependencies and generate computed data"
run = ["uv sync", "mise run preprocess"]

[tasks.setup-ci]
description = "Install system dependencies for CI (mlnative runtime dependencies)"
run = """
sudo apt-get update && sudo apt-get install -y \
  mesa-vulkan-drivers \
  libcurl4 \
  libglfw3 \
  libuv1 \
  zlib1g
"""

[tasks.dev]
depends = ["preprocess"]
run = "hugo server -D --disableFastRender"

[tasks.build]
description = "Full local build: preprocess, validate Hugo content, hugo, validate HTML, check links"
run = [
  "uv sync",
  "mise run preprocess",
  "mise run validate-hugo-content",
  "hugo --cleanDestinationDir --printPathWarnings --printUnusedTemplates",
  "mise run htmlcheck",
  "mise run linkcheck",
]

[tasks.build-ci]
description = "CI build: preprocess, validate Hugo content, hugo, validate HTML, then write machine-readable link diagnostics"
run = [
  "uv sync",
  "mise run preprocess",
  "mise run validate-hugo-content",
  "hugo --cleanDestinationDir --printPathWarnings --printUnusedTemplates",
  "mise run htmlcheck",
  "mise run linkcheck-json",
]

[tasks.preprocess]
run = "uv run python scripts/preprocess.py"

[tasks.validate-hugo-content]
description = "Fail on company/logos naming mismatches that Hugo treats as broken internal links"
run = "uv run python scripts/validate_hugo_content.py"

[tasks.linkcheck]
description = "Check links with lychee (warnings only)"
run = "lychee public/ --no-progress --format markdown --accept '200..=299, 301, 302, 403' --cache --max-cache-age 7d || true"

[tasks.linkcheck-json]
description = "Check links with lychee and write a JSON report for CI summaries/artifacts"
run = "mkdir -p .ci-reports/linkcheck && lychee public/ --no-progress --format json --output .ci-reports/linkcheck/lychee-report.json --accept '200..=299, 301, 302, 403' --cache --max-cache-age 7d || true"

[tasks.htmlcheck]
description = "Check HTML validity with superhtml"
run = "find public -name '*.html' | xargs superhtml check"

[tasks.scrape]
run = "uv run python scripts/scrape.py"

[tasks.scrape-fresh]
run = "uv run python scripts/scrape.py --fresh"

[tasks.scc]
description = "Count lines of code with SCC"
run = "scc --exclude-dir data,content --format table"

[tasks.a11ycheck]
description = "Run accessibility tests (CI only - requires pnpm install + Chromium)"
run = "pnpm exec pa11y-ci --config .pa11yci.json"
